# Codex CLI — project-level config
# See: https://github.com/openai/codex/blob/main/docs/config.md

model = "gpt-5-codex"
approval_policy = "on-request"

# Read AGENTS.md (plus CLAUDE.md / GEMINI.md as fallbacks) for project context.
project_doc_max_bytes = 32768
project_doc_fallback_filenames = ["CLAUDE.md", "GEMINI.md"]

# Prompts live in ~/.codex/prompts/ (user scope).
# Run `./.unicli-rules/sync.sh --install-codex-prompts` to install them with the
# prefix `unicli-` so slash commands like /unicli-researcher become available.

[mcp_servers.fetch]
command = "uvx"
args = ["mcp-server-fetch"]

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[mcp_servers.aws-docs]
command = "npx"
args = ["-y", "@aws/aws-documentation-mcp-server"]

[mcp_servers.tavily-search]
command = "npx"
args = ["-y", "tavily-mcp@latest"]
env_vars = ["TAVILY_API_KEY"]

[mcp_servers.tavily-search.env]
TAVILY_API_KEY = "${TAVILY_API_KEY}"

[mcp_servers.mcp-atlassian]
command = "uvx"
args = ["mcp-atlassian"]
env_vars = ["ATLASSIAN_API_TOKEN", "ATLASSIAN_URL", "ATLASSIAN_USER_EMAIL"]

[mcp_servers.mcp-atlassian.env]
ATLASSIAN_URL = "${ATLASSIAN_URL}"
ATLASSIAN_USER_EMAIL = "${ATLASSIAN_USER_EMAIL}"
ATLASSIAN_API_TOKEN = "${ATLASSIAN_API_TOKEN}"
